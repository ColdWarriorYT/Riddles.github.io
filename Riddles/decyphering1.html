<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Riddle 1 - Deciphering</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <main class="page">
        <header>
            <div>
                <h1>Riddle 1: Deciphering</h1>
                <p class="lead">Decode the riddle and enter the final word below.</p>
            </div>
        </header>

        <section class="riddle-card">
            <div class="card">
                <h2>The riddle</h2>
                <p id="riddle-text"><strong>&quot;Guvf vf nal bar yvax&quot;</strong>.</p>
            </div>

            <form id="answer-form" class="answer-form" autocomplete="off">
                <label for="answer-input">Answer</label>
                <input id="answer-input" name="answer" type="text" placeholder="Enter the secret word" required>
                <button type="submit">Check answer</button>
                <p id="answer-message" class="answer-message" aria-live="polite"></p>
            </form>

            <nav class="riddle-nav">
                <a href="../index.html">Back to index</a>
            </nav>
        </section>
    </main>

    <script src="../js/riddles.js"></script>
</body>
</html>
