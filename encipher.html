<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cipher Tool</title>
<link rel="stylesheet" href="css/styles.css">

<style>
.page {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px;
}

.card {
    padding: 16px;
    margin-bottom: 16px;
    border-radius: 10px;
}

h1, h2, h3 {
    margin: 0 0 10px 0;
}

p {
    margin: 6px 0;
}

.row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
}

textarea {
    width: 100%;
    height: 110px;
    padding: 10px;
    margin-top: 10px;
}

button, select, input {
    padding: 8px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    gap: 8px;
    margin-top: 12px;
}

.cell {
    padding: 8px;
    text-align: center;
    border: 1px solid #444;
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    font-family: monospace;
}

.cell.active {
    background: #2d6cdf;
    color: white;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<main class="page">

<header class="card">
    <h1>Cipher Tool</h1>
    <p>Multi-mode encryption + visual substitution editor</p>
</header>

<section class="card">

    <div class="row">
        <label>Mode:</label>
        <select id="mode" onchange="updateUI()">
            <option value="sub">Substitution</option>
            <option value="caesar">Caesar</option>
            <option value="atbash">Atbash</option>
        </select>

        <label id="shiftBox" class="hidden">
            Shift:
            <input id="shift" type="number" value="3" style="width:60px;">
        </label>
    </div>

</section>

<section class="card">

    <h3>Key Editor</h3>

    <div class="row">
        <button onclick="importKeyPrompt()">Import Key</button>
    </div>

    <div class="grid" id="grid"></div>

</section>

<section class="card">

    <h3>Input</h3>
    <textarea id="input"></textarea>

    <div class="row">
        <button onclick="encrypt()">Encrypt</button>
        <button onclick="decrypt()">Decrypt</button>
    </div>

</section>

<section class="card">

    <h3>Output</h3>
    <textarea id="output" readonly></textarea>

</section>

</main>

<script>

const alphabet = "abcdefghijklmnopqrstuvwxyz";

let key = {};
let reverseKey = {};
let selected = null;

/* ---------------- GRID ---------------- */

function initGrid() {
    const grid = document.getElementById("grid");

    for (let ch of alphabet) {
        const div = document.createElement("div");
        div.className = "cell";
        div.dataset.letter = ch;
        div.innerText = `${ch} → ?`;

        div.onclick = () => {
            if (selected) selected.classList.remove("active");
            selected = div;
            div.classList.add("active");
        };

        grid.appendChild(div);
    }
}

/* ---------------- KEY INPUT (CLICK MAP) ---------------- */

document.addEventListener("keydown", (e) => {
    if (!selected) return;

    let ch = e.key.toLowerCase();
    if (!alphabet.includes(ch)) return;

    let from = selected.dataset.letter;

    key[from] = ch;
    reverseKey[ch] = from;

    selected.innerText = `${from} → ${ch}`;

    selected.classList.remove("active");
    selected = null;
});

/* ---------------- IMPORT KEY ---------------- */

function isSingleLetter(value) {
    return /^[a-z]$/.test(String(value).toLowerCase());
}

function addMapping(from, to) {
    if (!isSingleLetter(from) || !isSingleLetter(to)) return;

    key[from] = to;
    reverseKey[to] = from;

    let cell = document.querySelector(`[data-letter="${from}"]`);
    if (cell) {
        cell.innerText = `${from} → ${to}`;
    }
}

function parseKeyInput(raw) {
    const text = String(raw || "").trim();
    if (!text) return;

    // Try JSON first so objects like {"a":"g","b":"h"} work.
    try {
        const parsed = JSON.parse(text);

        if (parsed && typeof parsed === "object") {
            if (Array.isArray(parsed)) {
                for (const entry of parsed) {
                    if (Array.isArray(entry) && entry.length >= 2) {
                        addMapping(entry[0], entry[1]);
                    } else if (entry && typeof entry === "object") {
                        for (const [from, to] of Object.entries(entry)) {
                            addMapping(from, to);
                        }
                    }
                }
            } else {
                for (const [from, to] of Object.entries(parsed)) {
                    addMapping(from, to);
                }
            }
            return;
        }
    } catch (e) {
        // Fall back to line-based parsing below.
    }

    const normalized = text
        .toLowerCase()
        .replace(/\u2192|\u21d2/g, "->")
        .replace(/["']/g, "")
        .replace(/[{}\[\]()]/g, " ")
        .replace(/[;,]+/g, "\n")
        .replace(/\s*->\s*/g, "=")
        .replace(/\s*=>\s*/g, "=")
        .replace(/\s*:\s*/g, "=");

    const lines = normalized.split(/\r?\n+/);

    for (const line of lines) {
        const cleaned = line.trim();
        if (!cleaned) continue;

        const direct = cleaned.match(/^([a-z])\s*=\s*([a-z])$/i);
        if (direct) {
            addMapping(direct[1], direct[2]);
            continue;
        }

        const parts = cleaned.split(/\s+/).filter(Boolean);
        if (parts.length === 2 && isSingleLetter(parts[0]) && isSingleLetter(parts[1])) {
            addMapping(parts[0], parts[1]);
            continue;
        }

        const eqParts = cleaned.split("=");
        if (eqParts.length === 2) {
            const [from, to] = eqParts.map(part => part.trim());
            addMapping(from, to);
        }
    }
}

function importKeyPrompt() {
    let raw = prompt('Paste key (supports formats like "a -> g", "a=g", "a:g", "a=>g", or JSON)');
    if (!raw) return;

    parseKeyInput(raw);
}

/* ---------------- MODES ---------------- */

function updateUI() {
    document.getElementById("shiftBox")
        .classList.toggle("hidden",
            document.getElementById("mode").value !== "caesar"
        );
}

/* ---------------- ENCRYPT / DECRYPT ---------------- */

function encrypt() {
    let mode = document.getElementById("mode").value;
    let text = document.getElementById("input").value.toLowerCase();
    document.getElementById("output").value = transformText(text, mode, true);
}

function decrypt() {
    let mode = document.getElementById("mode").value;
    let text = document.getElementById("input").value.toLowerCase();
    document.getElementById("output").value = transformText(text, mode, false);
}

/* ---------------- CORE ---------------- */

function transformText(text, mode, forward) {
    let out = "";

    for (let ch of text) {
        out += transformChar(ch, mode, forward);
    }

    return out;
}

function transformChar(ch, mode, forward) {

    if (!alphabet.includes(ch)) return ch;

    if (mode === "sub") {
        return forward ? (key[ch] || ch) : (reverseKey[ch] || ch);
    }

    if (mode === "caesar") {
        let shift = parseInt(document.getElementById("shift").value || 0);
        if (!forward) shift = -shift;

        let idx = alphabet.indexOf(ch);
        return alphabet[(idx + shift + 26) % 26];
    }

    if (mode === "atbash") {
        return alphabet[25 - alphabet.indexOf(ch)];
    }

    return ch;
}

/* ---------------- INIT ---------------- */

initGrid();
updateUI();

</script>

</body>
</html>
