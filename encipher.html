<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cipher Tool</title>
<link rel="stylesheet" href="css/styles.css">

<style>
.page {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px;
}

.card {
    padding: 16px;
    margin-bottom: 16px;
    border-radius: 10px;
}

h1, h2, h3 {
    margin: 0 0 10px 0;
}

p {
    margin: 6px 0;
}

.row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
}

textarea {
    width: 100%;
    height: 110px;
    padding: 10px;
    margin-top: 10px;
}

button, select, input, textarea {
    padding: 8px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    gap: 8px;
    margin-top: 12px;
}

.modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.modal-panel {
    width: min(520px, 90vw);
    background: white;
    color: #111;
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
}

.modal-panel textarea {
    width: 100%;
    min-height: 180px;
    resize: vertical;
    margin: 10px 0;
}

.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
}

.cell {
    padding: 8px;
    text-align: center;
    border: 1px solid #444;
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    font-family: monospace;
}

.cell.active {
    background: #2d6cdf;
    color: white;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<main class="page">

<header class="card">
    <h1>Cipher Tool</h1>
    <p>Multi-mode encryption + visual substitution editor</p>
</header>

<section class="card">

    <div class="row">
        <label>Method:</label>
        <select id="mode" onchange="updateUI()">
            <option value="sub">Substitution</option>
            <option value="caesar">Caesar</option>
            <option value="atbash">Atbash</option>
            <option value="rot13">ROT13</option>
            <option value="affine">Affine</option>
            <option value="vigenere">Vigenère</option>
            <option value="reverse">Reverse</option>
        </select>

        <div id="keyInputRow" class="row">
            <label>Key entry:</label>
            <select id="keyInputMode" onchange="updateUI()">
                <option value="visual">Visual substitution grid</option>
            </select>
        </div>
    </div>

    <div id="keyControls" class="row">
        <div id="substitutionBox" class="hidden">
            <div class="row">
                <button onclick="openImportDialog()">Import Key</button>
            </div>
            <div class="grid" id="grid"></div>
        </div>

        <div id="caesarBox" class="hidden">
            <label>Shift:
                <input id="shift" type="number" value="3" style="width:60px;">
            </label>
        </div>

        <div id="affineBox" class="hidden">
            <label>a:
                <input id="affineA" type="number" value="5" style="width:60px;">
            </label>
            <label>b:
                <input id="affineB" type="number" value="8" style="width:60px;">
            </label>
        </div>

        <div id="vigenereBox" class="hidden">
            <label>Keyword:
                <input id="vigenereKey" type="text" value="key" style="width:160px;">
            </label>
        </div>
    </div>

</section>

<div id="importModal" class="modal hidden">
    <div class="modal-panel">
        <h3>Import key</h3>
        <p>Paste one of these formats:</p>
        <p><em>a -> g</em>, <em>a=g</em>, <em>a:g</em>, <em>a=>g</em>, or JSON</p>
        <textarea id="importText" placeholder="a -> g&#10;b -> h"></textarea>
        <div class="modal-actions">
            <button onclick="closeImportDialog()">Cancel</button>
            <button onclick="confirmImport()">Import</button>
        </div>
    </div>
</div>

<section class="card">

    <h3>Input</h3>
    <textarea id="input"></textarea>

    <div class="row">
        <button onclick="encrypt()">Encrypt</button>
        <button onclick="decrypt()">Decrypt</button>
    </div>

</section>

<section class="card">
    <h3>How it works</h3>
    <div id="methodInfo">
        <p><strong>Substitution:</strong> each letter is replaced by another letter from your custom mapping.</p>
    </div>
</section>

<section class="card">

    <h3>Output</h3>
    <textarea id="output" readonly></textarea>

</section>

</main>

<script>

const alphabet = "abcdefghijklmnopqrstuvwxyz";

let key = {};
let reverseKey = {};
let selected = null;

/* ---------------- GRID ---------------- */

function initGrid() {
    const grid = document.getElementById("grid");

    for (let ch of alphabet) {
        const div = document.createElement("div");
        div.className = "cell";
        div.dataset.letter = ch;
        div.innerText = `${ch} → ?`;

        div.onclick = () => {
            if (selected) selected.classList.remove("active");
            selected = div;
            div.classList.add("active");
        };

        grid.appendChild(div);
    }
}

/* ---------------- KEY INPUT (CLICK MAP) ---------------- */

document.addEventListener("keydown", (e) => {
    const target = e.target;
    if (
        !selected ||
        e.altKey || e.ctrlKey || e.metaKey ||
        (target && (target.tagName === "INPUT" || target.tagName === "TEXTAREA" || target.tagName === "SELECT" || target.isContentEditable))
    ) {
        return;
    }

    let ch = e.key.toLowerCase();
    if (!alphabet.includes(ch)) return;

    let from = selected.dataset.letter;

    key[from] = ch;
    reverseKey[ch] = from;

    selected.innerText = `${from} → ${ch}`;

    selected.classList.remove("active");
    selected = null;
});

/* ---------------- IMPORT KEY ---------------- */

function isSingleLetter(value) {
    return /^[a-z]$/.test(String(value).toLowerCase());
}

function addMapping(from, to) {
    if (!isSingleLetter(from) || !isSingleLetter(to)) return;

    key[from] = to;
    reverseKey[to] = from;

    let cell = document.querySelector(`[data-letter="${from}"]`);
    if (cell) {
        cell.innerText = `${from} → ${to}`;
    }
}

function parseKeyInput(raw) {
    const text = String(raw || "").trim();
    if (!text) return;

    // Try JSON first so objects like {"a":"g","b":"h"} work.
    try {
        const parsed = JSON.parse(text);

        if (parsed && typeof parsed === "object") {
            if (Array.isArray(parsed)) {
                for (const entry of parsed) {
                    if (Array.isArray(entry) && entry.length >= 2) {
                        addMapping(entry[0], entry[1]);
                    } else if (entry && typeof entry === "object") {
                        for (const [from, to] of Object.entries(entry)) {
                            addMapping(from, to);
                        }
                    }
                }
            } else {
                for (const [from, to] of Object.entries(parsed)) {
                    addMapping(from, to);
                }
            }
            return;
        }
    } catch (e) {
        // Fall back to line-based parsing below.
    }

    const normalized = text
        .toLowerCase()
        .replace(/\u2192|\u21d2/g, "->")
        .replace(/["']/g, "")
        .replace(/[{}\[\]()]/g, " ")
        .replace(/[;,]+/g, "\n")
        .replace(/\s*->\s*/g, "=")
        .replace(/\s*=>\s*/g, "=")
        .replace(/\s*:\s*/g, "=");

    const lines = normalized.split(/\r?\n+/);

    for (const line of lines) {
        const cleaned = line.trim();
        if (!cleaned) continue;

        const direct = cleaned.match(/^([a-z])\s*=\s*([a-z])$/i);
        if (direct) {
            addMapping(direct[1], direct[2]);
            continue;
        }

        const parts = cleaned.split(/\s+/).filter(Boolean);
        if (parts.length === 2 && isSingleLetter(parts[0]) && isSingleLetter(parts[1])) {
            addMapping(parts[0], parts[1]);
            continue;
        }

        const eqParts = cleaned.split("=");
        if (eqParts.length === 2) {
            const [from, to] = eqParts.map(part => part.trim());
            addMapping(from, to);
        }
    }
}

function openImportDialog() {
    const modal = document.getElementById("importModal");
    const textarea = document.getElementById("importText");
    if (modal && textarea) {
        textarea.value = "";
        modal.classList.remove("hidden");
        textarea.focus();
    }
}

function closeImportDialog() {
    const modal = document.getElementById("importModal");
    if (modal) {
        modal.classList.add("hidden");
    }
}

function confirmImport() {
    const textarea = document.getElementById("importText");
    const raw = textarea ? textarea.value : "";
    if (!raw.trim()) return;

    parseKeyInput(raw);
    closeImportDialog();
}

/* ---------------- MODES ---------------- */

function updateUI() {
    const mode = document.getElementById("mode").value;
    const keyInputMode = document.getElementById("keyInputMode");
    const keyInputRow = document.getElementById("keyInputRow");
    const substitutionBox = document.getElementById("substitutionBox");
    const caesarBox = document.getElementById("caesarBox");
    const affineBox = document.getElementById("affineBox");
    const vigenereBox = document.getElementById("vigenereBox");
    const methodInfo = document.getElementById("methodInfo");

    const descriptions = {
        sub: "<p><strong>Substitution:</strong> each letter is replaced by another letter from your custom mapping.</p>",
        caesar: "<p><strong>Caesar:</strong> every letter shifts by a fixed number in the alphabet.</p>",
        atbash: "<p><strong>Atbash:</strong> letters are mirrored around the alphabet, so <em>a</em> becomes <em>z</em>.</p>",
        rot13: "<p><strong>ROT13:</strong> each letter shifts by 13 positions.</p>",
        affine: "<p><strong>Affine:</strong> each letter is transformed with the formula <em>y = ax + b</em> modulo 26.</p>",
        vigenere: "<p><strong>Vigenère:</strong> a repeating keyword shifts each letter in the message.</p>",
        reverse: "<p><strong>Reverse:</strong> the text is simply reversed character by character.</p>"
    };

    if (methodInfo) {
        methodInfo.innerHTML = descriptions[mode] || descriptions.sub;
    }

    const options = {
        sub: [["visual", "Visual substitution grid"], ["none", "None"]],
        caesar: [["shift", "Shift number"], ["none", "None"]],
        atbash: [["none", "None"]],
        rot13: [["none", "None"]],
        affine: [["affine", "Affine parameters"], ["none", "None"]],
        vigenere: [["keyword", "Keyword"], ["none", "None"]],
        reverse: [["none", "None"]]
    };

    const available = options[mode] || options.sub;
    const current = keyInputMode.value;

    keyInputMode.innerHTML = available.map(([value, label]) => `<option value="${value}">${label}</option>`).join("");

    if (available.some(([value]) => value === current)) {
        keyInputMode.value = current;
    } else {
        keyInputMode.value = available[0][0];
    }

    const needsKey = mode === "sub" || mode === "caesar" || mode === "affine" || mode === "vigenere";
    keyInputRow.classList.toggle("hidden", !needsKey);

    substitutionBox.classList.toggle("hidden", mode !== "sub" || keyInputMode.value !== "visual");
    caesarBox.classList.toggle("hidden", mode !== "caesar" || keyInputMode.value !== "shift");
    affineBox.classList.toggle("hidden", mode !== "affine" || keyInputMode.value !== "affine");
    vigenereBox.classList.toggle("hidden", mode !== "vigenere" || keyInputMode.value !== "keyword");
}

/* ---------------- ENCRYPT / DECRYPT ---------------- */

function encrypt() {
    let mode = document.getElementById("mode").value;
    let text = document.getElementById("input").value.toLowerCase();
    document.getElementById("output").value = transformText(text, mode, true);
}

function decrypt() {
    let mode = document.getElementById("mode").value;
    let text = document.getElementById("input").value.toLowerCase();
    document.getElementById("output").value = transformText(text, mode, false);
}

/* ---------------- CORE ---------------- */

function modInverse(a, m) {
    a = ((a % m) + m) % m;
    for (let x = 1; x < m; x++) {
        if ((a * x) % m === 1) return x;
    }
    return 1;
}

function transformText(text, mode, forward) {
    if (mode === "reverse") {
        return text.split("").reverse().join("");
    }

    if (mode === "vigenere") {
        const keyword = (document.getElementById("vigenereKey").value || "key")
            .toLowerCase()
            .replace(/[^a-z]/g, "");

        if (!keyword) return text;

        let out = "";
        let keyPos = 0;

        for (let ch of text) {
            if (!alphabet.includes(ch)) {
                out += ch;
                continue;
            }

            const shift = alphabet.indexOf(keyword[keyPos % keyword.length]);
            const idx = alphabet.indexOf(ch);
            const shifted = (idx + (forward ? shift : -shift) + 26) % 26;
            out += alphabet[shifted];
            keyPos++;
        }

        return out;
    }

    let out = "";

    for (let ch of text) {
        out += transformChar(ch, mode, forward);
    }

    return out;
}

function transformChar(ch, mode, forward) {

    if (!alphabet.includes(ch)) return ch;

    if (mode === "sub") {
        return forward ? (key[ch] || ch) : (reverseKey[ch] || ch);
    }

    if (mode === "caesar") {
        let shift = parseInt(document.getElementById("shift").value || 0);
        if (!forward) shift = -shift;

        let idx = alphabet.indexOf(ch);
        return alphabet[(idx + shift + 26) % 26];
    }

    if (mode === "rot13") {
        let idx = alphabet.indexOf(ch);
        return alphabet[(idx + (forward ? 13 : -13) + 26) % 26];
    }

    if (mode === "atbash") {
        return alphabet[25 - alphabet.indexOf(ch)];
    }

    if (mode === "affine") {
        const a = parseInt(document.getElementById("affineA").value || 1);
        const b = parseInt(document.getElementById("affineB").value || 0);
        const idx = alphabet.indexOf(ch);

        if (forward) {
            return alphabet[(a * idx + b) % 26];
        }

        const inv = modInverse(a, 26);
        return alphabet[(inv * ((idx - b + 26) % 26)) % 26];
    }

    return ch;
}

/* ---------------- INIT ---------------- */

initGrid();
updateUI();

</script>

</body>
</html>
